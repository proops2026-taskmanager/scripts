name: App CI — merge

on:
  push:
    branches: [main]
    paths-ignore:
      - 'iac/**'

jobs:
  ci:
    uses: chau11ece/proops2026-cicd-platform/.github/workflows/reusable-app-ci.yml@v1
    with:
      push: true
      image-name: ${{ github.repository }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
