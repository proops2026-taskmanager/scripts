name: App CI — PR

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'iac/**'

jobs:
  ci:
    uses: chau11ece/proops2026-cicd-platform/.github/workflows/reusable-app-ci.yml@v1
    with:
      push: false
      image-name: ${{ github.repository }}
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
