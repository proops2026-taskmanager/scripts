name: App CI — PR

on:
  pull_request:
    paths-ignore:
      - 'ci/**'

permissions:
  contents: read
  packages: write

jobs:
  ci:
    uses: chau11ece/proops2026-cicd-platform/.github/workflows/reusable-app-ci.yml@v1
    with:
      push: false
      image-name: ${{ github.repository }}
      working-directory: task-service
      context: task-service
    secrets:
      GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
