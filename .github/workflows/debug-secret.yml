name: Debug — Secret Access Test

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Check repo secret directly (no reusable workflow)
        env:
          KUBE_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
        run: |
          echo "Length of KUBE_CONFIG_DATA: ${#KUBE_DATA} chars"
          if [ "${#KUBE_DATA}" -gt 10 ]; then
            echo "Secret has content — decoding..."
            printf '%s' "$KUBE_DATA" | base64 -d > /tmp/test.yaml
            echo "Decoded size: $(wc -c < /tmp/test.yaml) bytes"
            head -1 /tmp/test.yaml
          else
            echo "Secret is EMPTY in this runner context"
          fi
