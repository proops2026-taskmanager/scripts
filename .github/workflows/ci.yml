name: CI

on:
  push:
  pull_request:

# IRD-32: workflow-level permissions — contents: read, packages: write
permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: lint ───────────────────────────────────────────────────────────────
  # Runs immediately (no needs:). Parallel with test.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -x --severity=warning \
            scripts/*.sh scripts/lib/*.sh \
            ecr-push.sh healthcheck.sh \
            e2e-tests/smoke/task-api.sh

  # ── Job 2: test ───────────────────────────────────────────────────────────────
  # Runs immediately (no needs:). Parallel with lint.
  # Two postgres containers — one per service, matching each .env.test exactly:
  #   task-service .env.test → localhost:5434/tasks_test_db
  #   user-service .env.test → localhost:5433/users_test_db
  # (Docker does not reliably map two host ports to the same container port)
  test:
    runs-on: ubuntu-latest
    services:
      postgres-task:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: tasks_test_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres-user:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: users_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Clone service repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="https://x-access-token:${GH_TOKEN}@github.com/proops2026-taskmanager"
          git clone --depth 1 "${BASE}/task-service.git" task-service
          git clone --depth 1 "${BASE}/user-service.git" user-service
          git clone --depth 1 "${BASE}/api-gateway.git" api-gateway
          git clone --depth 1 "${BASE}/frontend-service.git" frontend-service

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test task-service
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5434/tasks_test_db
        run: cd task-service && npm ci && npm test -- --coverage

      - name: Upload task-service coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-task-service
          path: task-service/coverage/lcov.info
          retention-days: 1

      - name: Test user-service
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5433/users_test_db
          JWT_SECRET: test_secret_minimum_32_characters_long
          JWT_EXPIRES_IN: 24h
        run: cd user-service && npm ci && npm test -- --coverage

      - name: Upload user-service coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-user-service
          path: user-service/coverage/lcov.info
          retention-days: 1

      - name: Test api-gateway
        run: cd api-gateway && npm ci && npm test -- --coverage

      - name: Upload api-gateway coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-api-gateway
          path: api-gateway/coverage/lcov.info
          retention-days: 1

      - name: Test frontend-service
        run: cd frontend-service && npm ci && npm run test -- --coverage

      - name: Upload frontend-service coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-frontend-service
          path: frontend-service/coverage/lcov.info
          retention-days: 1

  # ── Job 3: build-image ────────────────────────────────────────────────────────
  # Builds ALL 4 service images. Matrix runs 4 jobs in parallel.
  # Each image tagged: ghcr.io/proops2026-taskmanager/<service>:sha-<sha>
  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - service: task-service
            repo: proops2026-taskmanager/task-service
          - service: user-service
            repo: proops2026-taskmanager/user-service
          - service: api-gateway
            repo: proops2026-taskmanager/api-gateway
          - service: frontend-service
            repo: proops2026-taskmanager/frontend-service
    steps:
      - uses: actions/checkout@v4

      - name: Clone ${{ matrix.service }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ matrix.repo }}.git" ${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          cache-binary: false

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/proops2026-taskmanager/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 4: deploy ─────────────────────────────────────────────────────────────
  # Waits for ALL 4 build-image matrix jobs before proceeding.
  # Deploys task-service + postgres to kind for smoke verification.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4

      - name: Install kind and create cluster
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/v0.23.0/kind-linux-amd64
          chmod +x ./kind && sudo mv ./kind /usr/local/bin/kind
          kind create cluster --name ci-${{ github.run_id }} --wait 120s

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull task-service image and load into kind
        run: |
          IMAGE="ghcr.io/proops2026-taskmanager/task-service:sha-${{ github.sha }}"
          docker pull "${IMAGE}"
          kind load docker-image "${IMAGE}" --name ci-${{ github.run_id }}
          echo "Loaded: ${IMAGE}"

      - name: Update task-service image tag in manifest
        run: |
          IMAGE="ghcr.io/proops2026-taskmanager/task-service:sha-${{ github.sha }}"
          sed -i "s|image:.*taskmanager-task-service.*|image: ${IMAGE}|" \
            ci/k8s/task-svc-deployment.yaml
          echo "Updated manifest to: ${IMAGE}"
          grep "image:" ci/k8s/task-svc-deployment.yaml

      - name: Create task-svc-cm ConfigMap
        run: |
          kubectl create configmap task-svc-cm \
            --from-literal=PORT=3002 \
            --namespace=default

      - name: Create task-svc-secret Secret
        run: |
          kubectl create secret generic task-svc-secret \
            --from-literal=DATABASE_URL="postgresql://taskuser:taskpassword@postgres-svc:5432/taskmanager" \
            --namespace=default

      - name: Deploy postgres to kind cluster
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: postgres-cm
            namespace: default
          data:
            POSTGRES_USER: taskuser
            POSTGRES_PASSWORD: taskpassword
            POSTGRES_DB: taskmanager
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-svc
            namespace: default
          spec:
            selector:
              app: postgres
            ports:
              - port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                  - name: postgres
                    image: postgres:15
                    envFrom:
                      - configMapRef:
                          name: postgres-cm
                    ports:
                      - containerPort: 5432
          EOF

      - name: Wait for postgres rollout
        run: kubectl rollout status deployment/postgres --timeout=120s

      - name: Apply task-service manifests
        run: kubectl apply -f ci/k8s/

      - name: Wait for task-service rollout
        # IRD-32: mandatory — a crashing Pod must NOT count as a passing deploy
        run: kubectl rollout status deployment/task-service --timeout=180s

      - name: Evidence — verify SHA in running Pod
        # IRD-32 §3: this output is the mentor verification artifact
        run: |
          kubectl describe pod -l app=task-service | grep -E "Image:|Status:"

  # ── Job 5: sonar ─────────────────────────────────────────────────────────────
  # Runs parallel to build-image (both need [lint, test]).
  # Downloads all 4 coverage artifacts produced by the test job, then runs the
  # SonarCloud scan. fetch-depth: 0 is required — shallow clone breaks blame
  # data and PR decoration (IRD-34 §4).
  sonar:
    name: SonarCloud Code Analysis
    runs-on: ubuntu-latest
    needs: [test]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone service repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="https://x-access-token:${GH_TOKEN}@github.com/proops2026-taskmanager"
          git clone --depth 1 "${BASE}/task-service.git"   task-service
          git clone --depth 1 "${BASE}/user-service.git"   user-service
          git clone --depth 1 "${BASE}/api-gateway.git"    api-gateway
          git clone --depth 1 "${BASE}/frontend-service.git" frontend-service

      - name: Download task-service coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-task-service
          path: task-service/coverage

      - name: Download user-service coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-user-service
          path: user-service/coverage

      - name: Download api-gateway coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-api-gateway
          path: api-gateway/coverage

      - name: Download frontend-service coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-frontend-service
          path: frontend-service/coverage

      - name: SonarCloud scan
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXTRA_ARGS=""
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            EXTRA_ARGS="-Dsonar.pullrequest.key=${{ github.event.pull_request.number }} \
              -Dsonar.pullrequest.branch=${{ github.head_ref }} \
              -Dsonar.pullrequest.base=${{ github.base_ref }}"
          else
            EXTRA_ARGS="-Dsonar.branch.name=${GITHUB_REF_NAME}"
          fi
          docker run --rm \
            -e SONAR_HOST_URL=https://sonarcloud.io \
            -e SONAR_TOKEN="${SONAR_TOKEN}" \
            -e GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -v "$(pwd):/usr/src" \
            sonarsource/sonar-scanner-cli \
            sonar-scanner ${EXTRA_ARGS}

      - name: Check Quality Gate
        # sonar.qualitygate.wait=true queries /project_status?branch= but PR analyses
        # are stored under ?pullRequest=N — "Project not found" every time.
        # Poll the correct endpoint ourselves instead.
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          if [ -n "${{ github.event.pull_request.number }}" ]; then
            QUERY="pullRequest=${{ github.event.pull_request.number }}"
          else
            QUERY="branch=${GITHUB_REF_NAME}"
          fi
          echo "Polling Quality Gate: projectKey=proops2026-taskmanager_scripts&${QUERY}"
          for i in $(seq 1 10); do
            STATUS=$(curl -sf -u "${SONAR_TOKEN}:" \
              "https://sonarcloud.io/api/qualitygates/project_status?projectKey=proops2026-taskmanager_scripts&${QUERY}" \
              | python3 -c "import sys,json; print(json.load(sys.stdin)['projectStatus']['status'])" 2>/dev/null || echo "NONE")
            echo "Attempt ${i}/10: status=${STATUS}"
            if [ "${STATUS}" = "OK" ]; then
              echo "Quality Gate PASSED"; exit 0
            elif [ "${STATUS}" = "ERROR" ]; then
              echo "Quality Gate FAILED — new issues blocked merge"; exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for Quality Gate result"; exit 1

  # e2e-uat removed from CI.
  # Smoke tests against a real deployed environment belong in the CD pipeline,
  # where the full stack (all services, real secrets, real networking) is live.
  # Planned: .github/workflows/cd.yml — triggers on merge to main, deploys to
  # staging EKS, runs e2e-tests/smoke/task-api.sh against the live endpoint.
