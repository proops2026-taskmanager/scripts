name: CI
on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -x --severity=warning scripts/*.sh scripts/lib/*.sh ecr-push.sh healthcheck.sh

  validate:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Validate ECS task definitions
        run: |
          for f in ecs/task-defs/*.json; do
            echo "Validating $f ..."
            python3 -m json.tool "$f" > /dev/null && echo "  ✓ $f"
          done
