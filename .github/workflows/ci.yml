name: CI

on:
  push:
  pull_request:

# IRD-32: workflow-level permissions — contents: read, packages: write
permissions:
  contents: read
  packages: write

jobs:
  # ── Job 1: lint ───────────────────────────────────────────────────────────────
  # Runs immediately (no needs:). Parallel with test.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          shellcheck -x --severity=warning \
            scripts/*.sh scripts/lib/*.sh \
            ecr-push.sh healthcheck.sh \
            e2e-tests/smoke/task-api.sh

  # ── Job 2: test ───────────────────────────────────────────────────────────────
  # Runs immediately (no needs:). Parallel with lint.
  # Two postgres containers — one per service, matching each .env.test exactly:
  #   task-service .env.test → localhost:5434/tasks_test_db
  #   user-service .env.test → localhost:5433/users_test_db
  # (Docker does not reliably map two host ports to the same container port)
  test:
    runs-on: ubuntu-latest
    services:
      postgres-task:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: tasks_test_db
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres-user:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: users_test_db
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Clone service repos
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BASE="https://x-access-token:${GH_TOKEN}@github.com/proops2026-taskmanager"
          git clone --depth 1 "${BASE}/task-service.git" task-service
          git clone --depth 1 "${BASE}/user-service.git" user-service
          git clone --depth 1 "${BASE}/api-gateway.git" api-gateway
          git clone --depth 1 "${BASE}/frontend-service.git" frontend-service

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test task-service
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5434/tasks_test_db
        run: cd task-service && npm ci && npm test

      - name: Test user-service
        env:
          DATABASE_URL: postgresql://testuser:testpass@localhost:5433/users_test_db
        run: cd user-service && npm ci && npm test

      - name: Test api-gateway
        run: cd api-gateway && npm ci && npm test

      - name: Test frontend-service
        run: cd frontend-service && npm ci && npm test

  # ── Job 3: build-image ────────────────────────────────────────────────────────
  # Builds ALL 4 service images. Matrix runs 4 jobs in parallel.
  # Each image tagged: ghcr.io/proops2026-taskmanager/<service>:sha-<sha>
  build-image:
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - service: task-service
            repo: proops2026-taskmanager/task-service
          - service: user-service
            repo: proops2026-taskmanager/user-service
          - service: api-gateway
            repo: proops2026-taskmanager/api-gateway
          - service: frontend-service
            repo: proops2026-taskmanager/frontend-service
    steps:
      - uses: actions/checkout@v4

      - name: Clone ${{ matrix.service }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${{ matrix.repo }}.git" ${{ matrix.service }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/proops2026-taskmanager/${{ matrix.service }}
          tags: |
            type=sha,format=long
            type=raw,value=latest

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # ── Job 4: deploy ─────────────────────────────────────────────────────────────
  # Waits for ALL 4 build-image matrix jobs before proceeding.
  # Deploys task-service + postgres to kind for smoke verification.
  deploy:
    runs-on: ubuntu-latest
    needs: [build-image]
    steps:
      - uses: actions/checkout@v4

      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-${{ github.run_id }}
          wait: 120s

      - name: Update task-service image tag in manifest
        run: |
          IMAGE="ghcr.io/proops2026-taskmanager/task-service:sha-${{ github.sha }}"
          sed -i "s|image:.*taskmanager-task-service.*|image: ${IMAGE}|" \
            ci/k8s/task-svc-deployment.yaml
          echo "Updated manifest to: ${IMAGE}"
          grep "image:" ci/k8s/task-svc-deployment.yaml

      - name: Create task-svc-cm ConfigMap
        run: |
          kubectl create configmap task-svc-cm \
            --from-literal=PORT=3002 \
            --namespace=default

      - name: Create task-svc-secret Secret
        run: |
          kubectl create secret generic task-svc-secret \
            --from-literal=DATABASE_URL="postgresql://taskuser:taskpassword@postgres-svc:5432/taskmanager" \
            --namespace=default

      - name: Deploy postgres to kind cluster
        run: |
          kubectl apply -f - <<'EOF'
          apiVersion: v1
          kind: ConfigMap
          metadata:
            name: postgres-cm
            namespace: default
          data:
            POSTGRES_USER: taskuser
            POSTGRES_PASSWORD: taskpassword
            POSTGRES_DB: taskmanager
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres-svc
            namespace: default
          spec:
            selector:
              app: postgres
            ports:
              - port: 5432
                targetPort: 5432
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres
            namespace: default
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                  - name: postgres
                    image: postgres:15
                    envFrom:
                      - configMapRef:
                          name: postgres-cm
                    ports:
                      - containerPort: 5432
          EOF

      - name: Wait for postgres rollout
        run: kubectl rollout status deployment/postgres --timeout=120s

      - name: Apply task-service manifests
        run: kubectl apply -f ci/k8s/

      - name: Wait for task-service rollout
        # IRD-32: mandatory — a crashing Pod must NOT count as a passing deploy
        run: kubectl rollout status deployment/task-service --timeout=180s

      - name: Evidence — verify SHA in running Pod
        # IRD-32 §3: this output is the mentor verification artifact
        run: |
          kubectl describe pod -l app=task-service | grep -E "Image:|Status:"

  # ── Job 5: e2e-uat ────────────────────────────────────────────────────────────
  # Smoke test: task create → list → delete against kind cluster.
  e2e-uat:
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v4

      - name: Restore kind cluster context
        uses: helm/kind-action@v1
        with:
          cluster_name: ci-${{ github.run_id }}
          install_only: true

      - name: Port-forward task-service
        run: |
          kubectl port-forward svc/task-service 3002:3002 &
          sleep 5

      - name: Run smoke E2E (create → list → delete)
        run: BASE_URL=http://localhost:3002 bash e2e-tests/smoke/task-api.sh
