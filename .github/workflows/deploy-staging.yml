name: Deploy Staging (manual)

on:
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Commit SHA to deploy (copy from build run summary)"
        type: string
        required: true

permissions:
  contents: read

jobs:
  deploy:
    uses: chau11ece/proops2026-cicd-platform/.github/workflows/reusable-deploy.yml@v2
    secrets:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
    with:
      image-tag: ${{ inputs.image-tag }}
      environment: staging
      project-name: "proops2026-taskmanager"
      service-name: "scripts"
