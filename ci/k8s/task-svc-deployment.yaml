apiVersion: v1
kind: Service
metadata:
  name: task-service      # K8s DNS: task-service:3002 — referenced in api-gw-cm TASK_SERVICE_URL
  namespace: default
spec:
  selector:
    app: task-service
  ports:
    - port: 3002
      targetPort: 3002
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-service
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-service
  template:
    metadata:
      labels:
        app: task-service
    spec:
      containers:
        - name: task-service
          image: chaudevops/taskmanager-task-service:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3002
          envFrom:
            - configMapRef:
                name: task-svc-cm       # PORT
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: task-svc-secret
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 3002
            initialDelaySeconds: 10
            periodSeconds: 5
