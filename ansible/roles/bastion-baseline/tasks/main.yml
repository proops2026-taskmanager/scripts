---
# ansible/roles/bastion-baseline/tasks/main.yml
# Installs all operator tools on the bastion and configures kubectl access.
# Idempotent: every task uses `creates:` or `state: present` so re-runs are safe.

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Install base packages (jq, unzip, curl, postgresql-client)
  ansible.builtin.apt:
    name:
      - jq
      - unzip
      - curl
      - postgresql-client
    state: present
  become: true

- name: Install AWS CLI v2
  ansible.builtin.shell: |
    curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
    unzip -q /tmp/awscliv2.zip -d /tmp/
    /tmp/aws/install --update
    rm -rf /tmp/awscliv2.zip /tmp/aws
  args:
    creates: /usr/local/bin/aws
  become: true

- name: Install kubectl {{ kubectl_version }}
  ansible.builtin.get_url:
    url: "https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl"
    dest: /usr/local/bin/kubectl
    mode: "0755"
    checksum: "sha256:https://dl.k8s.io/release/v{{ kubectl_version }}/bin/linux/amd64/kubectl.sha256"
  become: true

- name: Install helm {{ helm_version }}
  ansible.builtin.shell: |
    curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | \
      DESIRED_VERSION=v{{ helm_version }} bash
  args:
    creates: /usr/local/bin/helm
  become: true

- name: Install argocd CLI {{ argocd_version }}
  ansible.builtin.get_url:
    url: "https://github.com/argoproj/argo-cd/releases/download/v{{ argocd_version }}/argocd-linux-amd64"
    dest: /usr/local/bin/argocd
    mode: "0755"
  become: true

- name: Install k9s {{ k9s_version }}
  ansible.builtin.unarchive:
    src: "https://github.com/derailed/k9s/releases/download/v{{ k9s_version }}/k9s_Linux_amd64.tar.gz"
    dest: /usr/local/bin/
    include:
      - k9s
    remote_src: true
    mode: "0755"
  become: true

- name: Create .kube directory for ubuntu user
  ansible.builtin.file:
    path: /home/ubuntu/.kube
    state: directory
    owner: ubuntu
    group: ubuntu
    mode: "0700"

- name: Configure kubeconfig — update-kubeconfig for {{ cluster_name }}
  ansible.builtin.template:
    src: kubeconfig.j2
    dest: /home/ubuntu/.kube/config
    owner: ubuntu
    group: ubuntu
    mode: "0600"

- name: Verify kubectl can reach cluster
  ansible.builtin.command: kubectl get nodes --no-headers
  become: false
  changed_when: false
  register: nodes_output

- name: Print cluster nodes
  ansible.builtin.debug:
    msg: "{{ nodes_output.stdout_lines }}"
