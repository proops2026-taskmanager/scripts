[defaults]
inventory          = inventories/dev/hosts.yml
remote_user        = ubuntu
private_key_file   = ~/.ssh/taskmanager-bastion.pem
host_key_checking  = False
roles_path         = roles
retry_files_enabled = False

# Show diff for every changed task — essential for auditing what Ansible actually wrote.
diff = True

# Colour output.
force_color = True

[ssh_connection]
# Reuse SSH connections across tasks — reduces latency on slow links.
pipelining = True
ssh_args   = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
