# ansible/inventories/dev/hosts.yml
#
# Populate bastion_ip after `terraform apply`:
#   export BASTION=$(terraform -chdir=../terraform/environments/dev output -raw bastion_public_ip)
#   ansible-playbook -i inventories/dev/hosts.yml playbooks/configure-bastion.yml -e bastion_ip=$BASTION
#
# Or update the ip field below directly for repeated runs.

all:
  children:
    bastion:
      hosts:
        taskmanager-bastion:
          # Replace with the value of `terraform output -raw bastion_public_ip`
          # after every `terraform apply` (Elastic IP not used in dev to save cost).
          ansible_host: "{{ bastion_ip | default('FILL_IN_AFTER_TERRAFORM_APPLY') }}"
          ansible_user: ubuntu
          ansible_ssh_private_key_file: ~/.ssh/taskmanager-bastion.pem
          ansible_ssh_extra_args: "-o StrictHostKeyChecking=no"
